name: Build Frida for Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl git libc6-dev-i386 \
          lib32stdc++-11-dev gcc-multilib g++-multilib ninja-build
        pip install meson
        
    - name: Apply patches (if any)
      run: |
        if [ -f patch_frida.py ]; then
          python patch_frida.py
        fi
        
    - name: Configure for android-arm64
      run: |
        ./configure --host android-arm64
        
    - name: Build frida-server
      run: |
        make
        
    - name: Package artifacts
      run: |
        mkdir -p artifacts
        cp build/subprojects/frida-core/server/frida-server artifacts/frida-server-android-arm64
        xz -9 artifacts/frida-server-android-arm64
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frida-server-android-arm64
        path: artifacts/
