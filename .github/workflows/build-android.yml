name: Build Frida for Android

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout main repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Checkout submodules manually
      run: |
        git submodule update --init
        cd subprojects/frida-core && git checkout main && git pull origin main
        cd ../frida-gum && git checkout main && git pull origin main
        cd ../..
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl git libc6-dev-i386 \
          lib32stdc++-11-dev gcc-multilib g++-multilib ninja-build \
          pkg-config libglib2.0-dev nodejs npm
        pip install meson==1.0.1
        
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        add-to-path: true
        
    - name: Build frida-server for android-arm64
      run: |
        make server-android-arm64
      env:
        FRIDA_HOST: android-arm64
        
    - name: Find and package artifacts
      run: |
        mkdir -p artifacts
        find build -name "frida-server" -type f | head -1 | xargs -I {} cp {} artifacts/frida-server-modded-arm64 || true
        if [ -f artifacts/frida-server-modded-arm64 ]; then
          xz -9 artifacts/frida-server-modded-arm64
        else
          echo "Build output not found, listing build directory:"
          find build -type f -name "*server*" 2>/dev/null || true
          ls -laR build/ 2>/dev/null | head -100 || true
        fi
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frida-server-modded-arm64
        path: artifacts/
        if-no-files-found: warn
